server {
    listen 443 ssl;
    server_name localhost; # Or your server's domain/IP

    # The paths to the files you just moved
    ssl_certificate     /etc/pki/tls/certs/your_cert.crt;
    ssl_certificate_key /etc/pki/tls/private/your_key.key;

    # Basic SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
